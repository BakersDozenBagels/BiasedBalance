# Patch for Ankh
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''if self.ability.name == 'Ankh' then 
        if #G.jokers.cards >= G.jokers.config.card_limit then  '''
position = "at"
payload = '''
if self.ability.name == 'Ankh' then 
    if #G.jokers.cards - 1 >= G.jokers.config.card_limit then 
'''
match_indent = true

# Patch for Smurf
[[patches]]
[patches.pattern]
target = '''=[SMODS _ "src/overrides.lua"]'''
pattern = '''
	local temp_in_pool = {}
    for k, v in ipairs(G.P_CENTER_POOLS['Booster']) do
'''
position = "at"
payload = '''
	local temp_in_pool = {}
	
	local booster_pool = {}
	if #SMODS.find_card('j_biasedBalance_Smurf') > 0 then
		for k, v in ipairs(G.P_CENTER_POOLS['Booster']) do
			if string.match(v.key, "mega") then
				booster_pool[#booster_pool + 1] = v
			end
		end
	else
		booster_pool = G.P_CENTER_POOLS['Booster']
	end
	
    for k, v in ipairs(booster_pool) do
'''
match_indent = true

