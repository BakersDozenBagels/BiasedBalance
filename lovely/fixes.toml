[manifest]
version = "1.0.0"
priority = 999


# Adds colors
[[patches]]
[patches.pattern]
target = "globals.lua"
pattern = "RENTAL = HEX('b18f43'),"
position = "after"
match_indent = true
payload = '''
BIASEDBALANCE_TEAL = HEX('79bbc3'),
BIASEDBALANCE_TANGERINE= HEX('fd8d3c'),

'''

[[patches]]
[patches.pattern]
target = "functions/misc_functions.lua"
pattern = "G.ARGS.LOC_COLOURS = G.ARGS.LOC_COLOURS or {"
position = "after"
match_indent = true
payload = '''
  biasedbalance_teal = G.C.BIASEDBALANCE_TEAL,
  biasedbalance_tangerine = G.C.BIASEDBALANCE_TANGERINE,
  
'''

# Wild Card tweak
[[patches]]
[patches.pattern]
target = 'blind.lua'
pattern = "if self.debuff.suit and card:is_suit(self.debuff.suit, true) then"
position = 'at' 
payload = "if self.debuff.suit and card:is_suit(self.debuff.suit, true) and card.ability.name ~= 'Wild Card' then"
match_indent = true

[[patches]]
[patches.pattern]
target = 'card.lua'
pattern = 'self.debuff = should_debuff'
position = 'after'
match_indent = true
payload = '''
if not self.debuff then self.debuffed_by_blind = false end
'''


# Omen Globe tweak
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/game_object.lua"]'
pattern = '_card = {set = "Planet", area = G.pack_cards, skip_materialize = true, soulable = true, key_append = "pl1"}'
position = 'before'
match_indent = true
payload = '''
if G.GAME.used_vouchers.v_omen_globe and pseudorandom('omen_globe') > 0.75 then
    _card = {set = "Spectral", area = G.pack_cards, skip_materialize = true, soulable = true, key_append = "pl2"}
else
'''
times = 1

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/game_object.lua"]'
pattern = '_card = {set = "Planet", area = G.pack_cards, skip_materialize = true, soulable = true, key_append = "pl1"}'
position = 'after'
match_indent = true
payload = 'end'
times = 1

# Magic Trick tweak
[[patches]]
[patches.regex]
target = 'functions/UI_definitions.lua'
pattern = "\\(G\\.GAME\\.used_vouchers\\[\"v_illusion\"\\] and pseudorandom\\(pseudoseed\\('illusion'\\)\\) > 0\\.6\\) and 'Enhanced' or 'Base'"
position = 'at'
payload = 'BiasedBalance and BiasedBalance.magic_trick()'
times = 1

# Illusion tweak
[[patches]]
[patches.regex]
target = 'functions/UI_definitions.lua'
pattern = "\\(v\\.type == 'Base' or v\\.type == 'Enhanced'\\) and G\\.GAME\\.used_vouchers\\[\"v_illusion\"\\] and pseudorandom\\(pseudoseed\\('illusion'\\)\\) > 0\\.8"
position = 'at'
payload = 'BiasedBalance and BiasedBalance.illusion(card, v.type)'
times = 1

# Common/Rare Tag tweak
[[patches]]
[patches.pattern]
target = 'card.lua'
pattern = 'self.ability.perishable = true'
position = 'at'
match_indent = true
payload = 'self.ability.perishable = _perishable'
times = 1

# Boss Tag tweak
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "-- TARGET: setting_blind effects"
position = "after"
match_indent = true
times = 1
payload = "if BiasedBalance then BiasedBalance.on_set_blind(G.GAME.blind) end"

# Blunted Impact w/o Talisman
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "-- TARGET: effects after hand evaluation"
position = "after"
match_indent = true
times = 1
payload = "if not Talisman then G.GAME.biasedBalance_priorHand = text end"

# Blue Stake Tweak
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "G.GAME.current_round.reroll_cost = (G.GAME.round_resets.temp_reroll_cost or G.GAME.round_resets.reroll_cost) + G.GAME.current_round.reroll_cost_increase"
position = "after"
match_indent = true
times = 1
payload = "* (BiasedBalance and BiasedBalance.reroll_scale() or 1)"

# Silver Stake
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''elseif not v.boss.showdown and (v.boss.min <= math.max(1, G.GAME.round_resets.ante) and ((math.max(1, G.GAME.round_resets.ante))%G.GAME.win_ante ~= 0 or G.GAME.round_resets.ante < 2)) then
    eligible_bosses[k] = res and true or nil'''
position = "at"
payload = '''
elseif v.boss.showdown and G.GAME.Biased_Balance.silver_stake_active and (G.GAME.round_resets.ante % 8 == 0) then
    eligible_bosses[k] = res and true or nil
elseif not v.boss.showdown and not (G.GAME.Biased_Balance.silver_stake_active and (G.GAME.round_resets.ante % 8 == 0)) 
and (v.boss.min <= math.max(1, G.GAME.round_resets.ante) and ((math.max(1, G.GAME.round_resets.ante))%G.GAME.win_ante ~= 0 
or G.GAME.round_resets.ante < 2)) then
    eligible_bosses[k] = res and true or nil'''
match_indent = true


# Jumbo
[[patches]]
[patches.regex]
target = "functions/button_callbacks.lua"
pattern = "card\\.edition and card\\.edition\\.card_limit or 0"
position = "at"
root_capture = "0"
times = 4
payload = "(card.edition and card.edition.card_limit or 0) + (card.config.center.key == 'j_biasedBalance_Jumbo' and -1 or 0) + (card.config.center.key == 'j_biasedBalance_Ego' and -1 or 0)"

[[patches]]
[patches.regex]
target = '=[SMODS _ "src/utils.lua"]'
pattern = "card\\.edition and card\\.edition\\.card_limit or 0"
position = "at"
root_capture = "0"
times = 1
payload = "(card.edition and card.edition.card_limit or 0) + (card.config.center.key == 'j_biasedBalance_Jumbo' and -1 or 0) + (card.config.center.key == 'j_biasedBalance_Ego' and -1 or 0)"

